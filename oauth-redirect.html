<!doctype html>
<html>
<head><meta charset="utf-8"><title>TikTok OAuth Redirect</title></head>
<body style="font-family:sans-serif;padding:40px;background:#111;color:#eee;">
  <h2>Authorization code:</h2>
  <textarea id="code" rows="4" style="width:100%;font-size:18px;padding:10px;" readonly></textarea>
  <p>Copy the text above and send it back.</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('code').value = params.get('code') || '(no code found — ' + window.location.search + ')';
  </script>
</body>
</html>
